name: Publish

# Publishes the NeoForge and Fabric jars to Modrinth, CurseForge, and the GitHub Release when a
# release is published. Set the following in the repository:
#   Secrets:   MODRINTH_TOKEN, CURSEFORGE_TOKEN   (GITHUB_TOKEN is provided automatically)
#   Variables: MODRINTH_ID, CURSEFORGE_ID          (the project ids on each platform)
# Tag the release the same as mod_version in gradle.properties (e.g. v0.1.0).

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build both loaders
        run: ./gradlew build --stacktrace

      - name: Publish to Modrinth, CurseForge, and GitHub
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            neoforge/build/libs/!(*-sources).jar
            fabric/build/libs/!(*-sources).jar
          name: Critfall ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: |
            neoforge
            fabric
          game-versions: "1.21.1"
          java: "21"
          dependencies: |
            fabric-api(optional){modrinth:fabric-api}{curseforge:306612}
          retry-attempts: 2
